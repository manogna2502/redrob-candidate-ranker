methodology_summary: |
  Four-stage retrieval funnel over the 100K-candidate pool, designed against
  the dataset's adversarial properties (~1% true-positive rate, ~80
  honeypots, claim-vs-measured skill inconsistency, consulting-only/
  research-only/title-chaser/langchain-tourist disqualifier patterns).

  (A) Structural gate, <1s: rule-based honeypot exclusion via three
  logical-impossibility checks (expert proficiency at duration_months=0;
  >=8 simultaneous expert skills; career start predating years_of_experience
  by >3yr) -- deterministic contradictions, not a learned classifier. A
  plausibility pre-filter narrows the pool with a min_survivors floor.

  (B) Semantic retrieval, ~40s: cosine similarity between a JD-narrative
  embedding and per-candidate documents. Primary: sentence-transformers/
  all-MiniLM-L6-v2 bi-encoder. Auto-fallback to TF-IDF on any load failure.

  (C) Hybrid scoring, <5s: 7 weighted components (semantic 0.32, skills 0.28,
  title 0.16, experience 0.08, location 0.08, notice 0.04, trajectory 0.04).
  Skills component is trust-discounted against Redrob's measured
  skill_assessment_scores, directly defeating the keyword-stuffer trap.
  Final score = base x behavioral_modifier (multiplicative, [0.50,1.10]).

  (D) Top-100 reasoning via fact-gated clause templates, not an LLM call --
  hallucination-proof by construction.

  Validated on the real dataset: 88/88 honeypots excluded, 0% trap leakage
  in top-100, 50.7s runtime, passes validate_submission.py.



